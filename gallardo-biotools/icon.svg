<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="flask" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
  <!-- Flask body -->
  <path d="M220 140 L220 240 L160 340 Q150 360 168 375 L344 375 Q362 360 352 340 L292 240 L292 140 Z"
        fill="url(#flask)" opacity="0.85" stroke="#a78bfa" stroke-width="2"/>
  <!-- Flask neck -->
  <rect x="215" y="120" width="82" height="25" rx="4" fill="#4c1d95" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- Bubbles inside flask -->
  <circle cx="230" cy="310" r="12" fill="#ec4899" opacity="0.6"/>
  <circle cx="270" cy="290" r="8" fill="#f59e0b" opacity="0.5"/>
  <circle cx="250" cy="330" r="10" fill="#a78bfa" opacity="0.5"/>
  <circle cx="300" cy="320" r="7" fill="#34d399" opacity="0.5"/>
  <!-- DNA helix hint (left) -->
  <ellipse cx="200" cy="280" rx="15" ry="4" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.6" transform="rotate(-30 200 280)"/>
  <ellipse cx="200" cy="295" rx="15" ry="4" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6" transform="rotate(30 200 295)"/>
  <!-- Atom orbits (right side) -->
  <ellipse cx="320" cy="280" rx="20" ry="8" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.5" transform="rotate(-45 320 280)"/>
  <ellipse cx="320" cy="280" rx="20" ry="8" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.5" transform="rotate(45 320 280)"/>
  <circle cx="320" cy="280" r="3" fill="#34d399" opacity="0.7"/>
  <!-- Text: BL -->
  <text x="256" y="420" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="48" fill="url(#accent)" letter-spacing="6">BIOLAB</text>
</svg>
